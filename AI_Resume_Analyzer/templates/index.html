<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>

    <style>
        body {
            font-family: Arial;
            background: #eef2f3;
            text-align: center;
        }

        .box {
            width: 50%;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
        }

        input {
            margin: 20px 0;
        }

        button {
            background: green;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: darkgreen;
        }
    </style>

</head>
<body>

<div class="box">

    <h1>AI Resume Analyzer</h1>

    <p>Upload your CV</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="resume" required>
        <br>
        <button type="submit">Analyze</button>
    </form>

</div>

</body>
</html>
