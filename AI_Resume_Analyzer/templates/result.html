<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <style>
        body {
            font-family: Arial;
            background: #eef2f3;
            text-align: center;
        }

        .box {
            width: 60%;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .score {
            font-size: 30px;
            color: green;
            font-weight: bold;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f1f1f1;
            margin: 5px;
            padding: 8px;
            border-radius: 5px;
        }

        .missing li {
            background: #ffdddd;
        }
    </style>

</head>
<body>

<div class="box">

    <h1>Resume Analysis Result</h1>

    <div class="score">Score: {{ score }} / 100</div>

    <h2>Detected Skills</h2>
    <ul>
        {% for skill in skills %}
        <li>{{ skill }}</li>
        {% endfor %}
    </ul>

    <h2>Missing Skills</h2>
    <ul class="missing">
        {% for skill in missing %}
        <li>{{ skill }}</li>
        {% endfor %}
    </ul>

    <a href="/">Go Back</a>

</div>

</body>
</html>
