<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>Campus Support Assistant 🎓</h1>

        <form method="POST">
            <input type="text" name="message" placeholder="Type your question here..." required>
            <button type="submit">Ask Bot</button>
        </form>

        {% if reply_text %}
        <div class="box">
            <p><strong>Response:</strong> {{ reply_text }}</p>
        </div>
        {% endif %}

    </div>

</body>
</html>
